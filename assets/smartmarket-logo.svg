<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" fill="none">
  <!-- Bucket/Basket Icon -->
  <g transform="translate(0, 8)">
    <!-- WiFi waves on top of bucket -->
    <path d="M28 18 Q36 10 44 18" stroke="#29ABFF" stroke-width="3" stroke-linecap="round" fill="none"/>
    <path d="M23 13 Q36 2 49 13" stroke="#29ABFF" stroke-width="3" stroke-linecap="round" fill="none"/>
    <!-- Center dot -->
    <circle cx="36" cy="22" r="2.5" fill="#29ABFF"/>
    <!-- Bucket body -->
    <path d="M18 28 L20 58 Q20 62 24 62 L48 62 Q52 62 52 58 L54 28 Z" fill="#29ABFF"/>
    <!-- Bucket top rim -->
    <rect x="15" y="25" width="42" height="6" rx="3" fill="#1A8FE0"/>
    <!-- Bucket handle -->
    <path d="M24 25 Q36 14 48 25" stroke="#1A8FE0" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <!-- Bucket shine -->
    <path d="M24 35 L22 55" stroke="rgba(255,255,255,0.25)" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Text: smart -->
  <text x="76" y="38" font-family="'Space Grotesk', 'DM Sans', Arial, sans-serif" font-size="26" font-weight="700" letter-spacing="-0.5" fill="#0D2352">smart</text>
  <!-- Text: market -->
  <text x="76" y="66" font-family="'Space Grotesk', 'DM Sans', Arial, sans-serif" font-size="26" font-weight="700" letter-spacing="-0.5" fill="#0D2352">market</text>
</svg>
